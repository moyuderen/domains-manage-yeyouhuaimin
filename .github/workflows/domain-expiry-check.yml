name: Domain Expiry Check

on:
  workflow_dispatch:

jobs:
  domain-expiry-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run domain expiry check job
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          ACCESS_SESSION_SIGNING_KEY: ${{ secrets.ACCESS_SESSION_SIGNING_KEY }}
          ACCESS_SESSION_MAX_AGE_SECONDS: ${{ secrets.ACCESS_SESSION_MAX_AGE_SECONDS }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm run job -- domain-expiry-check github-actions
